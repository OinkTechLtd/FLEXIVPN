name: 🤖 Update Servers

on:
  schedule:
    - cron: '0 3 * * *'  # каждый день в 03:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd robot && npm ci

      - name: Run robot
        run: cd robot && npm run run

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add servers.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-update servers"
          git push
